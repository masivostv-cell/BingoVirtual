<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Online - Jugador</title>
    <style>
        /* RESET Y FONDOS */
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* LOGIN */
        #login-section { background-color: #1e1e1e; padding: 30px; border-radius: 10px; text-align: center; margin-top: 50px; border: 2px solid #ffc107; width: 90%; max-width: 400px; box-sizing: border-box; }
        #login-section input { padding: 12px; margin: 10px 0; width: 100%; border-radius: 5px; border: none; box-sizing: border-box; font-size: 16px; }
        #login-section button { padding: 12px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 10px; }
        
        /* ESPACIO PARA VIDEO DE FACEBOOK RESPONSIVO */
        #video-section {
            width: 100%;
            background: #000;
            display: none; /* Se muestra al entrar si hay video */
            border-bottom: 3px solid #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .fb-video-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            /* Esta propiedad hace que el video escale perfecto en teléfono y PC sin cortarse */
            aspect-ratio: 16 / 9; 
        }
        #fb-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ZONA DE JUEGO PRINCIPAL */
        #game-section { display: none; width: 100%; max-width: 500px; text-align: center; padding: 20px 10px 50px 10px; box-sizing: border-box; }
        .info-jugador { background: #222; padding: 10px; border-radius: 8px; border: 1px solid #444; margin-bottom: 15px; font-size: 14px; }
        .info-jugador span { color: #ffc107; font-weight: bold; }
        
        /* CHAT INTERNO FLOTANTE */
        #btn-toggle-chat { position: fixed; bottom: 20px; right: 20px; background: #004080; color: white; border: 2px solid #fff; border-radius: 50%; width: 60px; height: 60px; font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 0; }
        #notificacion-chat { position: absolute; top: -5px; right: -5px; background: #d32f2f; color: white; font-size: 12px; width: 22px; height: 22px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-weight: bold; border: 2px solid #121212; }
        .chat-container { position: fixed; bottom: 90px; right: 20px; width: 320px; max-width: 85vw; background: #1a1a1a; border-radius: 10px; border: 1px solid #444; display: none; flex-direction: column; overflow: hidden; box-shadow: 0 6px 20px rgba(0,0,0,0.8); z-index: 1001; }
        .chat-header { background: #004080; color: white; padding: 10px 15px; font-weight: bold; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .chat-header span { text-transform: uppercase; letter-spacing: 1px; }
        .btn-minimizar { background: none; border: none; color: white; font-size: 18px; cursor: pointer; font-weight: bold; padding: 0; }
        .chat-messages { height: 220px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; font-size: 13px; scroll-behavior: smooth; }
        .chat-mensaje { background: #2d2d2d; padding: 8px 10px; border-radius: 6px; word-wrap: break-word; text-align: left; line-height: 1.4; }
        .chat-mensaje span { font-weight: bold; color: #ffc107; margin-right: 5px; }
        .chat-input-area { display: flex; border-top: 1px solid #333; }
        .chat-input-area input { flex: 1; padding: 12px; border: none; background: #111; color: white; outline: none; font-size: 14px; }
        .chat-input-area button { padding: 10px 15px; background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .chat-input-area button:hover { background: #218838; }

        /* ESTILO BOTÓN CANTAR BINGO */
        #container-btn-bingo { width: 100%; max-width: 450px; margin: 15px auto; display: flex; justify-content: center; }
        #btn-bingo { width: 100%; padding: 15px; border-radius: 10px; background-color: #d32f2f; color: white; border: 3px solid #ff4d4d; cursor: pointer; font-size: 22px; font-weight: 900; box-shadow: 0 6px 15px rgba(211, 47, 47, 0.4); transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 2px; }
        #btn-bingo:hover { background-color: #b71c1c; transform: translateY(-2px); }
        #btn-bingo:disabled { background-color: #9e9e9e; border-color: #777; cursor: not-allowed; box-shadow: none; transform: none; }

        /* CARTONES */
        .carton-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; background-color: black; padding: 5px; border: 5px solid black; user-select: none; width: 100%; box-sizing: border-box; }
        .letra-bingo { background-color: #004080; color: white; font-size: 22px; font-weight: bold; padding: 10px 0; }
        .numero-carton { background-color: white; color: black; font-size: clamp(18px, 5vw, 24px); font-weight: 900; padding: clamp(10px, 4vw, 20px) 0; cursor: pointer; transition: 0.1s; display: flex; align-items: center; justify-content: center; }
        .numero-carton:active { transform: scale(0.95); }
        .numero-carton.marcado { background-color: #ffeb3b; }
        .numero-carton.centro { background-color: #ccc; font-size: 20px; }
    </style>
</head>
<body>

    <div id="pantalla-ganador" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding: 20px; box-sizing: border-box;">
        <h1 style="color:#ffc107; font-size:50px; text-shadow: 0 0 20px #ffc107; margin-bottom:10px;">🏆 ¡BINGO! 🏆</h1>
        <h2 style="color:white; font-size:24px;">TENEMOS UN GANADOR</h2>
        <p id="texto-ganador" style="color:#28a745; font-size:35px; font-weight:900; margin:20px 0; text-transform: uppercase;">---</p>
        <p style="color:white; font-size:20px; background: #333; padding: 10px 20px; border-radius: 10px;">Con el Cartón #<span id="texto-carton-ganador" style="color:#00ffff; font-weight:bold;">---</span></p>
        
        <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 40px; width: 100%; max-width: 300px;">
            <button onclick="document.getElementById('pantalla-ganador').style.display='none'" style="padding:15px; font-size:16px; background:#004080; color:white; border:2px solid white; border-radius:10px; cursor:pointer; font-weight:bold;">JUGAR CON ESTE CARTÓN</button>
            <button onclick="location.reload()" style="padding:15px; font-size:16px; background:#d32f2f; color:white; border:2px solid white; border-radius:10px; cursor:pointer; font-weight:bold;">🔄 INGRESAR OTRO CARTÓN</button>
        </div>
    </div>

    <div id="login-section">
        <h2 style="color:#ffc107; margin-top:0;">Entrar a la Sala</h2>
        <input type="text" id="nombre-jugador" placeholder="Tu Nombre" maxlength="15">
        <input type="number" id="codigo-sala" placeholder="PIN de la Sala (6 dígitos)" style="font-size: 18px; font-weight: bold; text-align: center;">
        <input type="text" id="numero-carton" placeholder="N° de Cartones (Ej: 15 o 15,22,8)">
        
        <!-- Campo oculto para el video de facebook -->
        <input type="hidden" id="url-fb">

        <button onclick="entrarSala()">Ingresar al Juego</button>
    </div>

    <!-- Contenedor dinámico del Iframe de Facebook -->
    <div id="video-section">
        <div class="fb-video-container">
            <iframe id="fb-iframe" src="" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>
        </div>
    </div>

    <div id="game-section">
        <div class="info-jugador">
            Sala: <span id="display-sala">---</span> &nbsp;|&nbsp; Jugador: <span id="display-nombre">---</span>
        </div>

        <!-- Botón flotante para abrir el chat -->
        <button id="btn-toggle-chat" onclick="toggleChat()">
            💬
            <div id="notificacion-chat">!</div>
        </button>

        <!-- Chat Interno Flotante -->
        <div id="panel-chat" class="chat-container">
            <div class="chat-header">
                <span>💬 Chat de la Sala</span>
                <button class="btn-minimizar" onclick="toggleChat()">✖</button>
            </div>
            <div id="chat-messages" class="chat-messages">
                <!-- Los mensajes se cargarán aquí -->
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Escribe un mensaje..." maxlength="80">
                <button onclick="enviarMensaje()">Enviar</button>
            </div>
        </div>

        <div id="container-btn-bingo">
            <button id="btn-bingo" onclick="cantarBingo()">¡CANTAR BINGO!</button>
        </div>

        <div id="mi-carton" style="width: 100%; max-width: 450px; margin: 0 auto;"></div>
    </div>
     
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        // Actualizamos las importaciones para incluir arrayUnion (evitando errores de subcolecciones bloqueadas)
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc, getDoc, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDGlCcqIxjX3c_GustIB7_vjtyFwZ_q010",
            authDomain: "bingo-sala-2-online.firebaseapp.com",
            projectId: "bingo-sala-2-online",
            storageBucket: "bingo-sala-2-online.firebasestorage.app",
            messagingSenderId: "865001524589",
            appId: "1:865001524589:web:45a97bd5231f16f4c01e64"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let misCartonesData = []; 
        let numerosDeCartonesOficiales = []; 
        let balotasGlobales = [];
        let figuraGlobal = [];
        let miReferenciaDeJugador = null;
        window.ultimoMensajeChat = 0; // Guardamos el timestamp del último mensaje para notificar

        window.entrarSala = async () => {
            const nombre = document.getElementById('nombre-jugador').value.trim();
            const sala = document.getElementById('codigo-sala').value.toUpperCase();
            const numCartonInput = document.getElementById('numero-carton').value;
            const urlFbInput = document.getElementById('url-fb').value.trim();

            if (!nombre || !sala || !numCartonInput) { alert("Llena todos los campos obligatorios."); return; }

            const numsRequeridos = numCartonInput.split(',').map(n => n.trim()).filter(n => n !== "");

            const btnLogin = document.querySelector('#login-section button');
            btnLogin.innerText = "Buscando cartones...";
            btnLogin.disabled = true;

            try {
                const salaLimpia = String(sala).trim();
                const salaRef = doc(db, "salas", salaLimpia);
                const salaDoc = await getDoc(salaRef);

                if (salaDoc.exists()) {
                    const datosSala = salaDoc.data();
                    let todosLosCartones = null;

                    if (datosSala.estadoSala !== "abierta") {
                        alert("⏳ La sala está en espera para ser abierta por el administrador. Intenta de nuevo en un momento.");
                        btnLogin.innerText = "Ingresar al Juego";
                        btnLogin.disabled = false;
                        return; 
                    }

                    if (datosSala.cartonesEmpaquetados) {
                        try { todosLosCartones = JSON.parse(datosSala.cartonesEmpaquetados); } 
                        catch (e) { console.error("Error al desempaquetar:", e); }
                    } else if (datosSala.cartonesOficiales) {
                        todosLosCartones = datosSala.cartonesOficiales;
                    }

                    if (!todosLosCartones) {
                        alert("El administrador aún no ha subido los cartones a esta sala.");
                        btnLogin.innerText = "Ingresar al Juego";
                        btnLogin.disabled = false;
                        return;
                    }

                    misCartonesData = [];
                    let cartonesFaltantes = [];

                    for (let num of numsRequeridos) {
                        if (todosLosCartones[num]) {
                            misCartonesData.push({ id: num, numeros: todosLosCartones[num] });
                        } else {
                            cartonesFaltantes.push(num);
                        }
                    }

                    if (cartonesFaltantes.length > 0) {
                        alert(`Los siguientes cartones no existen en la sala: ${cartonesFaltantes.join(', ')}`);
                        btnLogin.innerText = "Ingresar al Juego";
                        btnLogin.disabled = false;
                        return;
                    }

                    numerosDeCartonesOficiales = numsRequeridos;
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('game-section').style.display = 'block';
                    document.getElementById('btn-toggle-chat').style.display = 'flex';
                    
                    document.getElementById('display-sala').innerText = sala;
                    document.getElementById('display-nombre').innerText = nombre;
                    
                    // Mostrar Video si hay enlace
                    const fbUrlToUse = urlFbInput || window.fbVideoURL;
                    if (fbUrlToUse) {
                        document.getElementById('video-section').style.display = 'block';
                        document.getElementById('fb-iframe').src = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(fbUrlToUse)}&show_text=0`;
                    }
                    
                    renderizarCartones();
                
                    miReferenciaDeJugador = doc(db, "salas", salaLimpia, "jugadores", nombre);
                    await setDoc(miReferenciaDeJugador, { nombre: nombre, cartones: numerosDeCartonesOficiales, conectadoEn: new Date() });

                    window.ultimaExpulsionVisto = datosSala.senalExpulsion || 0; 
                    window.ultimoReinicioVisto = datosSala.senalReinicio || 0;
                    window.ultimoGanadorVisto = datosSala.ganadorConfirmado ? datosSala.ganadorConfirmado.timestamp : 0;
                    window.ultimoMensajeChat = 0; // Reiniciar memoria de chat

                    // ESCUCHADOR PRINCIPAL DE LA SALA
                    onSnapshot(salaRef, (docSnapshot) => {
                        if (docSnapshot.exists()) {
                            const datos = docSnapshot.data();
                            
                            // Expulsión
                            if (datos.senalExpulsion && window.ultimaExpulsionVisto !== datos.senalExpulsion) {
                                window.ultimaExpulsionVisto = datos.senalExpulsion;
                                salirDelJuego(); 
                                alert("🔴 El administrador ha cerrado la sala. Serás llevado al inicio.");
                                window.location.reload(); 
                            }

                            // Reinicio
                            if (datos.senalReinicio && window.ultimoReinicioVisto !== datos.senalReinicio) {
                                window.ultimoReinicioVisto = datos.senalReinicio;
                                limpiarPantallaJugador(); 
                            }

                            // Actualizar balotas en memoria
                            if (datos.balotasLlamadas && datos.balotasLlamadas.length > 0) {
                                balotasGlobales = datos.balotasLlamadas;
                            } else {
                                balotasGlobales = [];
                                limpiarPantallaJugador();
                            }

                            // Actualizar figura en memoria
                            if (datos.figuraActual) {
                                figuraGlobal = datos.figuraActual;
                            }

                            // Ganador Confirmado
                            if (datos.ganadorConfirmado) {
                                if (window.ultimoGanadorVisto !== datos.ganadorConfirmado.timestamp) {
                                    window.ultimoGanadorVisto = datos.ganadorConfirmado.timestamp;
                                    document.getElementById('texto-ganador').innerText = datos.ganadorConfirmado.nombre;
                                    document.getElementById('texto-carton-ganador').innerText = datos.ganadorConfirmado.carton;
                                    document.getElementById('pantalla-ganador').style.display = 'flex';
                                }
                            }

                            // Cargar y mostrar mensajes del Chat Global (evita bloqueos de permisos)
                            if (datos.chatGlobal && Array.isArray(datos.chatGlobal)) {
                                renderizarChatInterno(datos.chatGlobal);
                            } else {
                                document.getElementById('chat-messages').innerHTML = ''; 
                            }
                        }
                    });

                } else {
                    alert("La sala no existe.");
                    btnLogin.innerText = "Ingresar al Juego";
                    btnLogin.disabled = false;
                }
            } catch (error) {
                console.error("Error: ", error);
                alert("Error de conexión al buscar los cartones.");
                btnLogin.innerText = "Ingresar al Juego";
                btnLogin.disabled = false;
            }
        };

        // --- SISTEMA DE CHAT INTERNO (OPTIMIZADO) ---
        window.toggleChat = () => {
            const panel = document.getElementById('panel-chat');
            const notif = document.getElementById('notificacion-chat');
            if (panel.style.display === 'flex') {
                panel.style.display = 'none';
            } else {
                panel.style.display = 'flex';
                notif.style.display = 'none'; // Quitar alerta al abrir
                document.getElementById('chat-input').focus();
            }
        };

        function renderizarChatInterno(mensajes) {
            const msgsDiv = document.getElementById('chat-messages');
            const panel = document.getElementById('panel-chat');
            const notif = document.getElementById('notificacion-chat');
            
            // Ordenar por fecha del más viejo al más nuevo
            mensajes.sort((a, b) => a.timestamp - b.timestamp);

            msgsDiv.innerHTML = '';
            
            mensajes.forEach((msg) => {
                msgsDiv.innerHTML += `<div class="chat-mensaje"><span>${msg.nombre}:</span> ${msg.texto}</div>`;
            });
            
            if (mensajes.length > 0) {
                const ultimo = mensajes[mensajes.length - 1];
                if (ultimo.timestamp > window.ultimoMensajeChat) {
                    // Si el chat está cerrado y no es la carga inicial (0), mostramos la burbuja roja
                    if (window.ultimoMensajeChat !== 0 && panel.style.display !== 'flex') {
                        notif.style.display = 'flex';
                    }
                    window.ultimoMensajeChat = ultimo.timestamp;
                    msgsDiv.scrollTop = msgsDiv.scrollHeight; // Bajar el scroll al nuevo mensaje
                }
            }
        }

        window.enviarMensaje = async () => {
            const input = document.getElementById('chat-input');
            const texto = input.value.trim();
            if (!texto) return; // No enviar vacío

            const nombre = document.getElementById('display-nombre').innerText.trim();
            const sala = document.getElementById('display-sala').innerText.trim();

            if (!nombre || !sala || sala === "---") return;

            input.value = ''; // Limpiar caja de texto de inmediato para dar sensación de rapidez

            try {
                // Guardamos directamente en el documento de la sala mediante ArrayUnion
                // (Mismos permisos que se usan para cantar Bingo, asegurando que funcione)
                const salaRef = doc(db, "salas", sala);
                await updateDoc(salaRef, {
                    chatGlobal: arrayUnion({
                        nombre: nombre,
                        texto: texto,
                        timestamp: Date.now()
                    })
                });
            } catch (error) {
                console.error("Error al enviar el mensaje", error);
                alert("Hubo un error al enviar tu mensaje. Intenta nuevamente.");
            }
        };

        window.toggleMarca = (elemento) => { elemento.classList.toggle('marcado'); };

        window.cantarBingo = async () => {
            if (!figuraGlobal || figuraGlobal.length !== 25) {
                alert("Aún no hay una figura válida configurada en la sala.");
                return;
            }

            const mapeoCarton = [0,5,10,15,20, 1,6,11,16,21, 2,7,12,17,22, 3,8,13,18,23, 4,9,14,19,24];
            let cartonesGanadores = []; 

            for (let carton of misCartonesData) {
                let bingoValido = true;
                for (let i = 0; i < 25; i++) {
                    if (figuraGlobal[i]) { 
                        let numeroEnCarton = carton.numeros[mapeoCarton[i]];
                        if (numeroEnCarton !== 0 && !balotasGlobales.includes(numeroEnCarton)) {
                            bingoValido = false;
                            break;
                        }
                    }
                }
                if (bingoValido) {
                    cartonesGanadores.push(carton.id); 
                }
            }

            if (cartonesGanadores.length === 0) {
                alert("¡FALSA ALARMA! Todavía te faltan números para completar la figura en tus cartones.");
                return; 
            }

            const cartonGanadorId = cartonesGanadores[0];

            const nombre = document.getElementById('display-nombre').innerText.trim();
            const sala = document.getElementById('display-sala').innerText.trim();
            const btn = document.getElementById('btn-bingo');
            
            btn.innerText = "ENVIANDO...";
            try {
                const salaLimpia = String(sala).trim();
                const salaRef = doc(db, "salas", salaLimpia);
                const datosBingo = { nombre: nombre, carton: cartonGanadorId, timestamp: Date.now() };
                
                await updateDoc(salaRef, { alertaBingo: datosBingo });
                
                btn.innerText = "¡BINGO ENVIADO!";
                btn.style.backgroundColor = "#28a745"; 
                alert(`¡Validación exitosa! Has cantado BINGO con el Cartón #${cartonGanadorId}.`);
                setTimeout(() => { btn.innerText = "¡CANTAR BINGO!"; btn.style.backgroundColor = "#d32f2f"; }, 5000);
            } catch (error) {
                console.error("Error al enviar el Bingo:", error);
                alert("Error al cantar Bingo. Revisa la conexión.");
                btn.innerText = "¡CANTAR BINGO!";
            }
        };

        function limpiarPantallaJugador() {
            document.getElementById('pantalla-ganador').style.display = 'none';
            document.querySelectorAll('.numero-carton').forEach(celda => {
                if(!celda.classList.contains('centro')) celda.classList.remove('marcado');
            });
        }

        function renderizarCartones() {
            const mainContainer = document.getElementById('mi-carton');
            mainContainer.innerHTML = ''; 
            
            mainContainer.style.display = 'flex';
            mainContainer.style.flexDirection = 'column';
            mainContainer.style.gap = '30px';
            mainContainer.style.alignItems = 'center';

            misCartonesData.forEach((cartonObj) => {
                let html = `<div style="width: 100%;">`;
                html += `<h3 style="margin: 0 0 10px 0; color: #ffc107; font-size: 24px; text-align: center;">CARTÓN #${cartonObj.id}</h3>`;
                html += `<div class="carton-container">`;
                
                ['B', 'I', 'N', 'G', 'O'].forEach(l => html += `<div class="letra-bingo">${l}</div>`);
                
                const mapeoCarton = [0,5,10,15,20, 1,6,11,16,21, 2,7,12,17,22, 3,8,13,18,23, 4,9,14,19,24];
                mapeoCarton.forEach((idx) => {
                    let num = cartonObj.numeros[idx];
                    if (num === 0) html += `<div class="numero-carton centro marcado">X</div>`;
                    else html += `<div class="numero-carton" onclick="toggleMarca(this)">${num}</div>`;
                });
                
                html += `</div></div>`;
                mainContainer.innerHTML += html;
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            
            const salaQuery = urlParams.get('sala');
            const cartonQuery = urlParams.get('carton');
            const fbVideoQuery = urlParams.get('fbvideo'); 

            const salaHash = window.location.hash.substring(1);
            const codigoDetectado = salaQuery || salaHash;

            if (codigoDetectado) document.getElementById('codigo-sala').value = codigoDetectado.toUpperCase();
            if (cartonQuery) document.getElementById('numero-carton').value = cartonQuery;
            
            if (fbVideoQuery) {
                window.fbVideoURL = fbVideoQuery; 
                document.getElementById('url-fb').value = fbVideoQuery;
            }

            if (codigoDetectado && cartonQuery) document.getElementById('nombre-jugador').focus();

            // Activar envío del chat presionando la tecla "Enter"
            const chatInput = document.getElementById('chat-input');
            if(chatInput) {
                chatInput.addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') {
                        window.enviarMensaje();
                    }
                });
            }
        });

        const salirDelJuego = () => {
            if (miReferenciaDeJugador) deleteDoc(miReferenciaDeJugador);
        };
        window.addEventListener('beforeunload', salirDelJuego);
        window.addEventListener('pagehide', salirDelJuego); 
    </script>
</body>
</html>
